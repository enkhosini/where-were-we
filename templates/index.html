<!DOCTYPE html>
<html>
<head>
  <title>Live Transcription Timeline</title>
  <style>
    body {
      font-family: sans-serif;
      background: #111;
      color: #eee;
      text-align: center;
      padding-top: 40px;
    }
    img {
      max-width: 90%;
      border-radius: 8px;
      box-shadow: 0 0 20px rgba(0,0,0,0.5);
    }
  </style>
</head>
<body>
  <h2>Live Transcription Timeline</h2>
  <img id="timeline" src="/static/timeline.png" alt="timeline">

  <script>
    const img = document.getElementById("timeline");
    const REFRESH_MS = 3000; // how often to check for updates

    setInterval(() => {
      // cache-busting query param forces browser to re-fetch instead of using cache
      img.src = "/static/timeline.png?t=" + Date.now();
    }, REFRESH_MS);
  </script>
</body>
</html>
